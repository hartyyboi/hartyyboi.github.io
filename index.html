<!DOCTYPE html>
<html>
<head>
    <title>System Login</title>
    <style>
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
        }
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background: white; 
            color: black; 
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            position: relative;
            overflow-y: auto;
        }
        
        #login-box { 
            text-align: center; 
            max-width: 90%;
            z-index: 10;
        }
        
        #dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('love-letter.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0; 
            transition: opacity 1s;
            z-index: -1;
        }
        
        #content { 
            display: none; 
            padding: 40px; 
            text-align: left; 
            max-width: 600px; 
            width: 100%;
            box-sizing: border-box;
            opacity: 0;
            transition: opacity 1s;
            background: white; 
            border: 1px solid black; 
            margin-top: 40px;
            margin-bottom: 40px;
            position: relative;
            z-index: 5;
        }
        
        #typewriter { 
            white-space: pre-wrap; 
            font-size: 1.1em; 
            line-height: 1.6;
        }
        
        input { 
            border: 1px solid black; 
            padding: 5px; 
            text-align: center;
            font-family: inherit;
        }
        
        button { 
            border: 1px solid black; 
            background: white; 
            cursor: pointer; 
            padding: 5px 10px;
            font-family: inherit;
        }

        #special-msg {
            display: none;
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 20px;
            animation: blink 1s infinite alternate;
        }
        
        @keyframes blink {
            0% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        #hint-next {
            font-size: 0.5em;
            font-weight: normal;
            margin-top: 10px;
            display: block;
            color: #333;
        }

        .fine-print { 
            position: absolute; 
            bottom: 15px; 
            font-size: 0.7em; 
            color: #888; 
            letter-spacing: 1px;
            z-index: 1;
        }

        .reveal-img {
            display: none;
            width: 100%; 
            max-width: 450px; 
            margin: 30px auto 10px;
            border: 1px solid black;
            opacity: 0;
            transition: opacity 1s;
        }
        
        /* Game Boy Style Pixel Breathing Animation */
        #flower-bouquet {
            max-width: 250px;
            border: none;
            margin: 20px auto;
            animation: spriteBounce 0.8s steps(2) infinite;
        }
        
        @keyframes spriteBounce {
            0% { transform: translateY(0); }
            50% { transform: translateY(-6px); } 
            100% { transform: translateY(0); }
        }
        
        #reveal-container {
            display: none;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>

    <div id="dynamic-bg"></div>

    <div id="login-box">
        <div id="special-msg">
            YOU REMEMBERED
            <span id="hint-next">the first place we saw each other</span>
        </div>
        <p id="prompt-text">Enter access key:</p>
        <input type="text" id="pwd" autocomplete="off">
        <button onclick="checkPassword()">SUBMIT</button>
        <p id="error" style="color: red; display: none; margin-top: 15px;">INVALID KEY.</p>
        <p id="meetup-hint" style="color: black; display: none; margin-top: 15px; font-weight: bold;">
            Hint: the convenience store for our meetup
        </p>
    </div>

    <div id="content">
        <div id="typewriter"></div>
        <br>
        <div id="reveal-container">
            <img src="7613682E-F50F-4287-9540-5F8741C2B7B6_1_105_c.jpeg" alt="Us" class="reveal-img" id="us-photo">
            <img src="Flowers.avif" alt="Flower Bouquet" class="reveal-img" id="flower-bouquet">
        </div>
    </div>

    <div id="footer-hint" class="fine-print">hint our date</div>

    <script>
        let mistakeCount = 0;

        function checkPassword() {
            const pass = document.getElementById('pwd').value.trim();
            const errorDiv = document.getElementById('error');
            const meetupHintDiv = document.getElementById('meetup-hint');
            const specialDiv = document.getElementById('special-msg');
            const promptText = document.getElementById('prompt-text');

            errorDiv.style.display = 'none';

            if (pass === "12/05/2025" || pass === "12052025") {
                specialDiv.style.display = 'block';
                promptText.innerText = "Enter verification key:";
                document.getElementById('pwd').value = ""; 
                meetupHintDiv.style.display = 'none'; 
                return;
            }

            if (pass.toLowerCase() === "7/11" || pass === "711") {
                unlockSequence();
                return;
            }

            mistakeCount++;
            errorDiv.style.display = 'block';
            if (mistakeCount >= 1) {
                meetupHintDiv.style.display = 'block';
            }
        }

        function unlockSequence() {
            document.body.style.justifyContent = 'flex-start';
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('footer-hint').style.display = 'none';
            
            const contentDiv = document.getElementById('content');
            const bgDiv = document.getElementById('dynamic-bg');
            contentDiv.style.display = 'block';
            bgDiv.style.opacity = 1; 

            setTimeout(() => { contentDiv.style.opacity = 1; }, 50);
            startTypewriter();
        }

        function startTypewriter() {
            const text = "My dearest Keano,\n\ni have written this letter as an explanation, chz\n\ni really wanted to started start this letter as natural as possible. I know “SORRY” is more said than i Love you, which sums up my shortcomings as your boyfriend. i didn’t not write this as an apology letter but rather a “JUST BECAUSE LETTER”. I have said it enough for you to really appreciate it but i wanted you to know that I REALLY APPRECIATE YOU everyday. I may have a hard time being expressive to you as i am trying my best to not weird you out in anyway. actually i just made this JUST BECAUSE LETTER as my way of keeping up to that level you gave me once and was never got appreciation it deserved. I wanted to recreated that but found many websites to be common, which I was not satisfied with it. I built this custom site as a way to say “you brought the colors that were once stripped out, you replaced the once dull things to something new and exciting, you made me the happiest person and I hope I did that the same to you”. i hope you’re not offended of how basic this looks….\n\nI LOVE YOU MY BABY!!! \n\nHAPPY ADVANCE MONTHSARY <3";
            
            const div = document.getElementById('typewriter');
            let i = 0;
            function type() {
                if (i < text.length) {
                    div.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 45); 
                } else {
                    revealImages();
                }
            }
            type();
        }
        
        function revealImages() {
            const container = document.getElementById('reveal-container');
            const usPhoto = document.getElementById('us-photo');
            const flowerBouquet = document.getElementById('flower-bouquet');
            
            container.style.display = 'flex';
            usPhoto.style.display = 'block';
            setTimeout(() => { usPhoto.style.opacity = 1; }, 100);
            
            setTimeout(() => {
                flowerBouquet.style.display = 'block';
                setTimeout(() => { flowerBouquet.style.opacity = 1; }, 100);
                setTimeout(() => {
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                }, 1100);
            }, 1000);
        }
    </script>
</body>
</html>
